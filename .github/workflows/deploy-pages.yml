name: Deploy DCAT-BR to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'DCAT-BR/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Prepare static files
        run: |
          # Criar diretório limpo para o site
          mkdir -p _site
          
          # Copiar TODOS os arquivos do DCAT-BR para _site
          if [ -d "DCAT-BR" ]; then
            cp -r DCAT-BR/* _site/
            # Garantir que .nojekyll existe
            touch _site/.nojekyll
            echo "✅ Arquivos copiados de DCAT-BR/"
          else
            echo "❌ Pasta DCAT-BR não encontrada!"
            exit 1
          fi
          
          # Verificar se index.html existe
          if [ ! -f "_site/index.html" ]; then
            echo "❌ index.html não encontrado!"
            exit 1
          fi
          
          # Listar estrutura para debug
          echo "📁 Estrutura do site:"
          ls -la _site/ | head -20
          echo ""
          echo "📄 index.html encontrado:"
          head -5 _site/index.html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
